<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>利润成本计算器</title>
<script src="echarts.min.js"></script>
<style>
  :root {
    --bg: #f1f5f9;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --profit: #16a34a;
    --loss: #dc2626;
    --accent: #2563eb;
    --warn: #d97706;
    --income: #0891b2;
    --expense: #ea580c;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 12px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header .logo { display: flex; align-items: center; gap: 10px; }
  .header .logo h1 { font-size: 19px; font-weight: 700; color: var(--text); }
  .header .logo .dot { width: 8px; height: 8px; background: var(--profit); border-radius: 50%; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .tab-nav {
    display: flex;
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    gap: 0;
    overflow-x: auto;
    position: sticky;
    top: 54px;
    z-index: 99;
  }
  .tab-btn {
    padding: 11px 18px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .btn {
    padding: 7px 15px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #f8fafc; border-color: #cbd5e1; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-danger { background: var(--loss); border-color: var(--loss); color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-success { background: var(--profit); border-color: var(--profit); color: #fff; }
  .btn-success:hover { background: #15803d; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--accent); }
  .btn-ghost:hover { background: #eff6ff; }

  .container { max-width: 1320px; margin: 0 auto; padding: 18px 24px; }

  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
  .summary-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }
  .summary-card .sc-icon { font-size: 22px; margin-bottom: 6px; }
  .summary-card .sc-label { color: var(--muted); font-size: 12px; }
  .summary-card .sc-value { font-size: 24px; font-weight: 700; margin-top: 2px; }
  .summary-card .sc-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .summary-card.income { border-left: 3px solid var(--income); }
  .summary-card.expense { border-left: 3px solid var(--expense); }
  .summary-card.profit { border-left: 3px solid var(--profit); }
  .summary-card.margin { border-left: 3px solid var(--accent); }

  .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }

  .panel {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
  }
  .panel h2 { font-size: 15px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .panel h3 { font-size: 13px; color: var(--text); margin-bottom: 10px; font-weight: 600; }

  .form-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .form-row input, .form-row select {
    flex: 1;
    min-width: 80px;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
  }
  .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
  .form-row input[type="number"] { max-width: 130px; }
  .form-row select { max-width: 120px; }
  .form-row input[type="date"] { max-width: 145px; }

  .table-wrap { overflow-x: auto; max-height: 340px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 9px 10px; border-bottom: 2px solid var(--border); color: var(--muted); font-weight: 600; position: sticky; top: 0; background: #fff; z-index: 1; }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  tr:hover td { background: #f8fafc; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-income { background: rgba(8,145,178,0.1); color: var(--income); }
  .tag-expense { background: rgba(234,88,12,0.1); color: var(--expense); }
  .delete-btn { background: none; border: none; color: var(--loss); cursor: pointer; font-size: 15px; padding: 2px 6px; border-radius: 4px; }
  .delete-btn:hover { background: #fef2f2; }

  .chart-box { width: 100%; height: 300px; }
  .chart-box-lg { width: 100%; height: 400px; }
  .chart-box-sm { width: 100%; height: 220px; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }

  .suggestion {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .suggestion.critical { background: #fef2f2; border-color: #fecaca; }
  .suggestion.positive { background: #f0fdf4; border-color: #bbf7d0; }
  .suggestion .s-title { font-weight: 600; color: var(--warn); }
  .suggestion.critical .s-title { color: var(--loss); }
  .suggestion.positive .s-title { color: var(--profit); }
  .suggestion .s-detail { color: var(--muted); margin-top: 2px; }
  .suggestion .s-impact { color: var(--text); margin-top: 4px; font-size: 12px; }

  .empty-state { text-align: center; color: var(--muted); padding: 50px 20px; }
  .empty-state .big { font-size: 40px; margin-bottom: 10px; }

  .template-card {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .template-card .tm-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 13px; }
  .template-card .tm-amount { font-weight: 600; }

  .goal-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }
  .goal-progress {
    height: 14px;
    background: #e2e8f0;
    border-radius: 7px;
    overflow: hidden;
    margin-top: 8px;
  }
  .goal-progress .fill { height: 100%; border-radius: 7px; transition: width 0.6s ease; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
  .compare-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }
  .compare-card .cmp-value { font-size: 22px; font-weight: 700; }
  .compare-card .cmp-label { font-size: 11px; color: var(--muted); }

  .profit-positive { color: var(--profit); }
  .profit-negative { color: var(--loss); }
  .text-muted { color: var(--muted); font-size: 12px; }
  .text-warn { color: var(--warn); }
  .text-accent { color: var(--accent); }
  .mb { margin-bottom: 16px; }
  .mt { margin-top: 12px; }
  .gap { display: flex; gap: 8px; flex-wrap: wrap; }
  .divider { border-top: 1px solid var(--border); margin: 14px 0; }

  @media (max-width: 1000px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .main-grid, .charts-grid, .grid-3 { grid-template-columns: 1fr; }
  }
  @media print {
    body { background: #fff; }
    .header, .tab-nav, .header-actions { display: none; }
    .panel { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="dot"></span>
    <h1>利润成本计算器</h1>
  </div>
  <div class="header-actions">
    <button class="btn btn-sm btn-success" onclick="manualSave()" id="saveBtn">💾 保存数据</button>
    <button class="btn btn-sm" onclick="exportCSV()">导出 CSV</button>
    <button class="btn btn-sm" onclick="importCSV()">导入 CSV</button>
    <button class="btn btn-sm" onclick="backupData()">备份</button>
    <button class="btn btn-sm btn-danger" onclick="clearAll()">🗑 清空</button>
  </div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" data-tab="dashboard">📊 仪表盘</button>
  <button class="tab-btn" data-tab="records">💰 收支管理</button>
  <button class="tab-btn" data-tab="templates">📋 固定模板</button>
  <button class="tab-btn" data-tab="breakeven">📈 盈亏平衡</button>
  <button class="tab-btn" data-tab="scenario">🔮 情景模拟</button>
  <button class="tab-btn" data-tab="goals">🎯 目标追踪</button>
  <button class="tab-btn" data-tab="suggestions">💡 分析建议</button>
</div>

<div class="container">

<!-- ========== TAB 1: DASHBOARD ========== -->
<div class="tab-content active" id="tab-dashboard">
  <div class="summary-grid">
    <div class="summary-card income"><div class="sc-icon">📈</div><div class="sc-label">总收入</div><div class="sc-value" id="dashIncome">¥0</div><div class="sc-sub" id="dashIncomeSub"></div></div>
    <div class="summary-card expense"><div class="sc-icon">📉</div><div class="sc-label">总支出</div><div class="sc-value" id="dashExpense">¥0</div><div class="sc-sub" id="dashExpenseSub"></div></div>
    <div class="summary-card profit"><div class="sc-icon">💎</div><div class="sc-label">净利润</div><div class="sc-value" id="dashProfit">¥0</div><div class="sc-sub" id="dashProfitSub"></div></div>
    <div class="summary-card margin"><div class="sc-icon">📐</div><div class="sc-label">利润率</div><div class="sc-value" id="dashMargin">0%</div><div class="sc-sub" id="dashMarginSub"></div></div>
  </div>

  <!-- Month comparison -->
  <div class="panel mb">
    <h3>📅 月度对比</h3>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;" id="monthCompare"></div>
  </div>

  <div class="charts-grid">
    <div class="panel"><h3>📊 月度收支趋势</h3><div class="chart-box" id="chartTrend"></div></div>
    <div class="panel"><h3>📊 收支类别对比</h3><div class="chart-box" id="chartBar"></div></div>
  </div>
  <div class="grid-3">
    <div class="panel"><h3>支出占比</h3><div class="chart-box-sm" id="chartExpensePie"></div></div>
    <div class="panel"><h3>收入来源</h3><div class="chart-box-sm" id="chartIncomePie"></div></div>
    <div class="panel"><h3>利润率</h3><div class="chart-box-sm" id="chartGauge"></div></div>
  </div>
</div>

<!-- ========== TAB 2: RECORDS ========== -->
<div class="tab-content" id="tab-records">
  <div class="main-grid">
    <div class="panel">
      <h2>📈 添加收入</h2>
      <div class="form-row">
        <input type="date" id="incomeDate">
        <input type="text" id="incomeDesc" placeholder="描述">
        <input type="number" id="incomeAmount" placeholder="金额" step="0.01">
        <select id="incomeCat"><option value="">类别</option><option value="销售">销售</option><option value="服务">服务</option><option value="投资">投资</option><option value="其他">其他</option></select>
        <button class="btn btn-primary" onclick="addIncome()">+ 添加</button>
      </div>
    </div>
    <div class="panel">
      <h2>📉 添加支出</h2>
      <div class="form-row">
        <input type="date" id="expenseDate">
        <input type="text" id="expenseDesc" placeholder="描述">
        <input type="number" id="expenseAmount" placeholder="金额" step="0.01">
        <select id="expenseCat"><option value="">类别</option><option value="原材料">原材料</option><option value="人力">人力</option><option value="租金">租金</option><option value="营销">营销</option><option value="物流">物流</option><option value="行政">行政</option><option value="税费">税费</option><option value="其他">其他</option></select>
        <button class="btn btn-primary" onclick="addExpense()">+ 添加</button>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="panel mb">
    <h3>🔍 筛选</h3>
    <div class="filter-bar">
      <input type="date" id="filterDateFrom" style="max-width:140px;" onchange="renderFilteredTable()">
      <span class="text-muted">至</span>
      <input type="date" id="filterDateTo" style="max-width:140px;" onchange="renderFilteredTable()">
      <select id="filterType" style="max-width:100px;" onchange="renderFilteredTable()">
        <option value="all">全部类型</option><option value="收入">收入</option><option value="支出">支出</option>
      </select>
      <select id="filterCat" style="max-width:120px;" onchange="renderFilteredTable()">
        <option value="all">全部类别</option>
        <optgroup label="收入"><option value="销售">销售</option><option value="服务">服务</option><option value="投资">投资</option><option value="其他收入">其他收入</option></optgroup>
        <optgroup label="支出"><option value="原材料">原材料</option><option value="人力">人力</option><option value="租金">租金</option><option value="营销">营销</option><option value="物流">物流</option><option value="行政">行政</option><option value="税费">税费</option><option value="其他支出">其他支出</option></optgroup>
      </select>
      <input type="text" id="filterSearch" placeholder="搜索描述..." style="max-width:160px;" oninput="renderFilteredTable()">
      <button class="btn btn-sm btn-ghost" onclick="clearFilters()">清除筛选</button>
      <span class="text-muted" id="filterCount" style="margin-left:auto;"></span>
    </div>
    <div class="table-wrap" id="filteredTableWrap" style="max-height:400px;"></div>
  </div>
</div>

<!-- ========== TAB 3: TEMPLATES ========== -->
<div class="tab-content" id="tab-templates">
  <div class="main-grid">
    <div class="panel">
      <h3>📝 添加固定模板</h3>
      <p class="text-muted mb">设定每月固定收支项，一键自动录入</p>
      <div class="form-row">
        <select id="tmplType" style="max-width:100px;"><option value="收入">收入</option><option value="支出">支出</option></select>
        <input type="text" id="tmplDesc" placeholder="描述（如：房租）">
        <input type="number" id="tmplAmount" placeholder="金额" step="0.01">
        <select id="tmplCat" style="max-width:110px;"><option value="">类别</option></select>
      </div>
      <button class="btn btn-primary" onclick="addTemplate()">+ 添加模板</button>
      <button class="btn btn-success mt" onclick="applyAllTemplates()">⚡ 一键应用本月模板</button>
    </div>
    <div class="panel">
      <h3>📋 已保存模板</h3>
      <div id="templatesList"></div>
    </div>
  </div>
</div>

<!-- ========== TAB 4: BREAK-EVEN ========== -->
<div class="tab-content" id="tab-breakeven">
  <div class="main-grid">
    <div class="panel">
      <h3>📝 输入参数</h3>
      <div class="form-row"><label style="width:140px;">固定成本 (元)</label><input type="number" id="beFixedCost" value="50000"></div>
      <div class="form-row"><label style="width:140px;">单位售价 (元)</label><input type="number" id="bePrice" value="200"></div>
      <div class="form-row"><label style="width:140px;">单位变动成本 (元)</label><input type="number" id="beVarCost" value="80"></div>
      <div class="form-row"><label style="width:140px;">目标利润 (元)</label><input type="number" id="beTargetProfit" value="30000"></div>
      <button class="btn btn-primary mt" onclick="calcBreakEven()">计算</button>
      <button class="btn btn-sm mt" onclick="autoFillBE()">用实际数据填充</button>
    </div>
    <div class="panel">
      <h3>📊 计算结果</h3>
      <div id="beResult" style="font-size:13px;"></div>
    </div>
  </div>
  <div class="panel mt"><div class="chart-box-lg" id="chartBreakEven"></div></div>
</div>

<!-- ========== TAB 5: SCENARIO ========== -->
<div class="tab-content" id="tab-scenario">
  <div class="main-grid">
    <div class="panel">
      <h3>🎛️ 调整变量</h3>
      <p class="text-muted mb">拖动滑块查看不同情景下的利润变化</p>
      <div style="margin-bottom:14px;"><label>收入 <span id="scIncomeLabel">+0%</span></label><input type="range" id="scIncome" min="-50" max="50" value="0" style="width:75%;" oninput="document.getElementById('scIncomeLabel').textContent=(this.value>0?'+':'')+this.value+'%';runScenario();"></div>
      <div style="margin-bottom:14px;"><label>原材料 <span id="scMaterialLabel">+0%</span></label><input type="range" id="scMaterial" min="-50" max="50" value="0" style="width:75%;" oninput="document.getElementById('scMaterialLabel').textContent=(this.value>0?'+':'')+this.value+'%';runScenario();"></div>
      <div style="margin-bottom:14px;"><label>人力 <span id="scLaborLabel">+0%</span></label><input type="range" id="scLabor" min="-50" max="50" value="0" style="width:75%;" oninput="document.getElementById('scLaborLabel').textContent=(this.value>0?'+':'')+this.value+'%';runScenario();"></div>
      <div style="margin-bottom:14px;"><label>营销 <span id="scMarketingLabel">+0%</span></label><input type="range" id="scMarketing" min="-50" max="50" value="0" style="width:75%;" oninput="document.getElementById('scMarketingLabel').textContent=(this.value>0?'+':'')+this.value+'%';runScenario();"></div>
      <div style="margin-bottom:14px;"><label>其他 <span id="scOtherLabel">+0%</span></label><input type="range" id="scOther" min="-50" max="50" value="0" style="width:75%;" oninput="document.getElementById('scOtherLabel').textContent=(this.value>0?'+':'')+this.value+'%';runScenario();"></div>
      <button class="btn btn-sm" onclick="resetScenario()">重置</button>
      <button class="btn btn-sm btn-primary" onclick="saveScenario()">保存情景</button>
    </div>
    <div class="panel"><h3>📊 模拟结果</h3><div id="scenarioResult" style="font-size:13px;"></div></div>
  </div>
  <div class="panel mt"><h3>📋 已保存情景</h3><div id="savedScenarios"></div></div>
</div>

<!-- ========== TAB 6: GOALS ========== -->
<div class="tab-content" id="tab-goals">
  <div class="main-grid">
    <div class="panel">
      <h3>🎯 设置目标</h3>
      <p class="text-muted mb">设定年度利润目标，追踪完成进度</p>
      <div class="form-row">
        <input type="text" id="goalName" placeholder="目标名称">
        <input type="number" id="goalAmount" placeholder="目标金额" step="0.01">
        <input type="month" id="goalDeadline" style="max-width:150px;">
      </div>
      <button class="btn btn-primary" onclick="addGoal()">+ 设置目标</button>
    </div>
    <div class="panel">
      <h3>📊 目标进度</h3>
      <div id="goalsList"></div>
    </div>
  </div>
</div>

<!-- ========== TAB 7: SUGGESTIONS ========== -->
<div class="tab-content" id="tab-suggestions">
  <div class="panel">
    <h3>💡 智能分析建议</h3>
    <div id="suggestionsContent"></div>
  </div>
</div>

</div>

<script>
// ========== DATA STORE ==========
const STORAGE_KEY = 'profit_calc_v4';
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const d = raw ? JSON.parse(raw) : { income: [], expense: [], templates: [], goals: [], scenarios: [] };
    if (!d.templates) d.templates = [];
    if (!d.goals) d.goals = [];
    if (!d.scenarios) d.scenarios = [];
    return d;
  } catch { return { income: [], expense: [], templates: [], goals: [], scenarios: [] }; }
}
let data = loadData();
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function manualSave() {
  save();
  const btn = document.getElementById('saveBtn');
  const orig = btn.textContent;
  btn.textContent = '✅ 已保存';

// ========== HELPERS ==========
function calcTotals() {
  const ti = data.income.reduce((s,e)=>s+e.amount,0);
  const te = data.expense.reduce((s,e)=>s+e.amount,0);
  return { totalIncome: ti, totalExpense: te, netProfit: ti-te, margin: ti>0?(ti-te)/ti*100:0 };
}
function fm(n) {
  const a = Math.abs(n);
  if (a>=1e8) return (n>=0?'¥':'-¥')+(a/1e8).toFixed(2)+'亿';
  if (a>=10000) return (n>=0?'¥':'-¥')+(a/10000).toFixed(2)+'万';
  return (n>=0?'¥':'-¥')+a.toFixed(2);
}
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function today() { return new Date().toISOString().split('T')[0]; }
function thisMonth() { return today().substring(0,7); }

document.querySelectorAll('.tab-btn').forEach(btn => {

}

// ========== FILTERING ==========
function renderFilteredTable() {
  const from = document.getElementById('filterDateFrom').value;
  const to = document.getElementById('filterDateTo').value;
  const type = document.getElementById('filterType').value;
  const cat = document.getElementById('filterCat').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();

  let rows = [
    ...data.income.map(e=>({...e,type:'收入'})),
    ...data.expense.map(e=>({...e,type:'支出'})),
  ].sort((a,b)=>b.id-a.id);

  if (from) rows = rows.filter(r=>r.date>=from);
  if (to) rows = rows.filter(r=>r.date<=to);
  if (type!=='all') rows = rows.filter(r=>r.type===type);
  if (cat!=='all') {
    const catMap = { '其他收入':'其他', '其他支出':'其他' };
    const target = catMap[cat] || cat;
    rows = rows.filter(r=>r.category===target && (cat==='其他收入'?r.type==='收入':cat==='其他支出'?r.type==='支出':true));
  }
  if (search) rows = rows.filter(r=>r.desc.toLowerCase().includes(search));

  const wrap = document.getElementById('filteredTableWrap');
  document.getElementById('filterCount').textContent = '共 ' + rows.length + ' 条';
  if (rows.length===0) {
    wrap.innerHTML = '<div class="empty-state" style="padding:20px;">没有匹配的记录</div>';
    return;
  }
  let html = '<table><thead><tr><th>类型</th><th>日期</th><th>描述</th><th>类别</th><th>金额</th><th>操作</th></tr></thead><tbody>';
  rows.forEach(e => {
    const color = e.type==='收入'?'var(--income)':'var(--expense)';
    const sign = e.type==='收入'?'+':'-';
    html += `<tr>
      <td><span class="tag ${e.type==='收入'?'tag-income':'tag-expense'}">${e.type}</span></td>
      <td>${e.date}</td><td>${esc(e.desc)}</td><td>${esc(e.category)}</td>
      <td style="color:${color}">${sign}¥${e.amount.toFixed(2)}</td>
      <td><button class="delete-btn" onclick="deleteEntry('${e.type==='收入'?'income':'expense'}',${e.id})">×</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}
function clearFilters() {
  ['filterDateFrom','filterDateTo','filterSearch'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('filterType').value='all';
  document.getElementById('filterCat').value='all';
  renderFilteredTable();
}

function renderGoals() {
  const wrap = document.getElementById('goalsList');

    return `<div class="goal-card">
      <div style="display:flex;justify-content:space-between;align-items:center;">

        <span style="color:${color}">${pct.toFixed(1)}%</span>
      </div>
      <div class="goal-progress"><div class="fill" style="width:${pct}%;background:${color};"></div></div>
      ${pct<100 ? `<div class="text-muted" style="margin-top:4px;">还差 ${fm(g.amount-netProfit)}，每月需 ${fm((g.amount-netProfit)/Math.max(1,monthsRemaining(g.deadline)))}</div>` : '<div style="margin-top:4px;color:var(--profit);">🎉 目标已达成！</div>'}
      <button class="btn btn-sm btn-ghost" style="margin-top:6px;" onclick="deleteGoal(${g.id})">删除</button>
    </div>`;
  }).join('');
}
function monthsRemaining(deadline) {
  const [y,m] = deadline.split('-').map(Number);
  const now = new Date();
  return Math.max(1, (y-now.getFullYear())*12 + (m-now.getMonth()-1));
}

function refreshDashboard() {
  const { totalIncome, totalExpense, netProfit, margin } = calcTotals();
  document.getElementById('dashIncome').textContent = fm(totalIncome);
  document.getElementById('dashExpense').textContent = fm(totalExpense);
  document.getElementById('dashProfit').textContent = fm(netProfit);
  document.getElementById('dashProfit').className = 'sc-value '+(netProfit>=0?'profit-positive':'profit-negative');
  document.getElementById('dashMargin').textContent = margin.toFixed(1)+'%';
  document.getElementById('dashMargin').className = 'sc-value '+(margin>=0?'profit-positive':'profit-negative');
  document.getElementById('dashIncomeSub').textContent = data.income.length+' 条记录';
  document.getElementById('dashExpenseSub').textContent = data.expense.length+' 条记录';
  document.getElementById('dashProfitSub').textContent = netProfit>=0?'盈利中':'亏损中';
  document.getElementById('dashMarginSub').textContent = margin>=30?'非常健康':margin>=15?'健康':margin>=5?'需关注':margin>=0?'偏低':'亏损';

  // Month comparison
  const thisM = thisMonth();
  const lastM = new Date(new Date().getFullYear(), new Date().getMonth()-1, 1).toISOString().substring(0,7);
  const lastYM = (new Date().getFullYear()-1)+'-'+(new Date().getMonth()+1).toString().padStart(2,'0');
  const tiM = data.income.filter(e=>e.date.startsWith(thisM)).reduce((s,e)=>s+e.amount,0);
  const teM = data.expense.filter(e=>e.date.startsWith(thisM)).reduce((s,e)=>s+e.amount,0);
  const tiLM = data.income.filter(e=>e.date.startsWith(lastM)).reduce((s,e)=>s+e.amount,0);
  const teLM = data.expense.filter(e=>e.date.startsWith(lastM)).reduce((s,e)=>s+e.amount,0);
  const tiLY = data.income.filter(e=>e.date.startsWith(lastYM)).reduce((s,e)=>s+e.amount,0);
  const teLY = data.expense.filter(e=>e.date.startsWith(lastYM)).reduce((s,e)=>s+e.amount,0);
  const npM = tiM-teM, npLM = tiLM-teLM, npLY = tiLY-teLY;

  document.getElementById('monthCompare').innerHTML = `
    <div class="compare-card"><div class="cmp-label">本月收入</div><div class="cmp-value" style="color:var(--income)">${fm(tiM)}</div><div class="text-muted">环比 ${pctChange(tiM,tiLM)}</div></div>
    <div class="compare-card"><div class="cmp-label">本月支出</div><div class="cmp-value" style="color:var(--expense)">${fm(teM)}</div><div class="text-muted">环比 ${pctChange(teM,teLM)}</div></div>
    <div class="compare-card"><div class="cmp-label">本月利润</div><div class="cmp-value ${npM>=0?'profit-positive':'profit-negative'}">${fm(npM)}</div><div class="text-muted">环比 ${pctChange(npM,npLM)}</div></div>
    <div class="compare-card"><div class="cmp-label">同比去年同月</div><div class="cmp-value ${npLY>=0?'profit-positive':'profit-negative'}">${fm(npLY)}</div><div class="text-muted">去年同月利润</div></div>
  `;

  renderDashboardCharts();
}

function pctChange(curr, prev) {
  if (prev===0) return curr===0?'--':'(新增)';
  const p = ((curr-prev)/Math.abs(prev)*100).toFixed(1);
  return (p>=0?'↑':'↓')+Math.abs(p)+'%';
}

// ========== BREAK-EVEN ==========
function autoFillBE() {
  const totalExp = data.expense.reduce((s,e)=>s+e.amount,0);
  const matCost = data.expense.filter(e=>e.category==='原材料').reduce((s,e)=>s+e.amount,0);
  const rentCost = data.expense.filter(e=>e.category==='租金').reduce((s,e)=>s+e.amount,0);
  const laborCost = data.expense.filter(e=>e.category==='人力').reduce((s,e)=>s+e.amount,0);
  document.getElementById('beFixedCost').value = Math.round(rentCost + laborCost*0.7).toString();
  document.getElementById('beVarCost').value = totalExp > 0 ? Math.round(matCost / Math.max(1, data.income.length) * 1.5).toString() : '80';
  calcBreakEven();
}

function calcBreakEven() {
  const fc = parseFloat(document.getElementById('beFixedCost').value) || 0;
  const price = parseFloat(document.getElementById('bePrice').value) || 0;
  const vc = parseFloat(document.getElementById('beVarCost').value) || 0;
  const tp = parseFloat(document.getElementById('beTargetProfit').value) || 0;
  const cm = price - vc;
  const beUnits = cm>0 ? Math.ceil(fc/cm) : Infinity;
  const beRev = cm>0 ? beUnits*price : Infinity;
  const cmRatio = price>0 ? cm/price*100 : 0;
  const tgtUnits = cm>0 ? Math.ceil((fc+tp)/cm) : Infinity;
  const tgtRev = cm>0 ? tgtUnits*price : Infinity;
  const actualInc = calcTotals().totalIncome;
  const safety = beRev>0&&actualInc>0 ? ((actualInc-beRev)/actualInc*100) : 0;

  document.getElementById('beResult').innerHTML = `
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);"><span>边际贡献/单位</span><strong>${fm(cm)}</strong></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);"><span>边际贡献率</span><strong>${cmRatio.toFixed(1)}%</strong></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);"><span>🟡 盈亏平衡点</span><strong style="font-size:18px;color:var(--warn)">${beUnits===Infinity?'N/A':beUnits.toLocaleString()+' 件 / '+fm(beRev)}</strong></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);"><span>🎯 目标利润 ${fm(tp)} 需销量</span><strong style="color:var(--accent)">${tgtUnits===Infinity?'N/A':tgtUnits.toLocaleString()+' 件 / '+fm(tgtRev)}</strong></div>
    <div style="display:flex;justify-content:space-between;padding:6px 0;"><span>🛡️ 安全边际</span><strong style="color:${safety>20?'var(--profit)':'var(--loss)'}">${safety.toFixed(1)}% ${safety>20?'✓':'⚠'}</strong></div>
  `;

  const chart = getChart('chartBreakEven'); if (!chart) return;
  const maxU = Math.max(beUnits*2, tgtUnits*1.5, 1000);
  const us=[], rev=[], tc=[], fcLine=[];
  for (let i=0; i<=maxU; i+=Math.ceil(maxU/50)) { us.push(i); rev.push(i*price); tc.push(fc+i*vc); fcLine.push(fc); }
  chart.setOption({
    tooltip:{trigger:'axis'}, legend:{data:['收入','总成本','固定成本'],textStyle:{color:'#64748b'}},
    grid:{left:70,right:20,top:30,bottom:40},
    xAxis:{type:'category',data:us,name:'销量(件)',nameTextStyle:{color:'#64748b'},axisLabel:{color:'#64748b'}},
    yAxis:{type:'value',name:'金额(元)',nameTextStyle:{color:'#64748b'},axisLabel:{color:'#64748b',formatter:v=>(v/10000).toFixed(0)+'万'},splitLine:{lineStyle:{color:'#e2e8f0'}}},
    series:[
      {name:'收入',type:'line',data:rev,lineStyle:{color:'#0891b2'},symbol:'none'},
      {name:'总成本',type:'line',data:tc,lineStyle:{color:'#ea580c'},symbol:'none'},
      {name:'固定成本',type:'line',data:fcLine,lineStyle:{color:'#64748b',type:'dashed'},symbol:'none'},
    ],
  });
}

// ========== SCENARIO ==========
function runScenario() {
  const { totalIncome, totalExpense } = calcTotals();
  const rI = parseInt(document.getElementById('scIncome').value)||0;
  const rMat = parseInt(document.getElementById('scMaterial').value)||0;
  const rLab = parseInt(document.getElementById('scLabor').value)||0;
  const rMkt = parseInt(document.getElementById('scMarketing').value)||0;
  const rOth = parseInt(document.getElementById('scOther').value)||0;
  const matExp = data.expense.filter(e=>e.category==='原材料').reduce((s,e)=>s+e.amount,0);
  const labExp = data.expense.filter(e=>e.category==='人力').reduce((s,e)=>s+e.amount,0);
  const mktExp = data.expense.filter(e=>e.category==='营销').reduce((s,e)=>s+e.amount,0);
  const other = totalExpense - matExp - labExp - mktExp;
  const newInc = totalIncome*(1+rI/100);
  const newExp = matExp*(1+rMat/100)+labExp*(1+rLab/100)+mktExp*(1+rMkt/100)+other*(1+rOth/100);
  const newP = newInc-newExp;
  const oldP = totalIncome-totalExpense;
  const change = newP-oldP;

  document.getElementById('scenarioResult').innerHTML = `
    <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);"><span>调整后收入</span><span style="color:var(--income)">${fm(newInc)}</span></div>
    <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);"><span>调整后支出</span><span style="color:var(--expense)">${fm(newExp)}</span></div>
    <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);"><span>调整后利润</span><strong style="font-size:18px;color:${newP>=0?'var(--profit)':'var(--loss)'}">${fm(newP)}</strong></div>
    <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);"><span>利润率</span><strong>${newInc>0?(newP/newInc*100).toFixed(1):0}%</strong></div>
    <div style="display:flex;justify-content:space-between;padding:5px 0;"><span>利润变化</span><strong style="color:${change>=0?'var(--profit)':'var(--loss)'}">${change>=0?'+':''}${fm(change)}</strong></div>
  `;
}
function resetScenario() {
  ['scIncome','scMaterial','scLabor','scMarketing','scOther'].forEach(id=>document.getElementById(id).value=0);
  ['scIncomeLabel','scMaterialLabel','scLaborLabel','scMarketingLabel','scOtherLabel'].forEach(id=>document.getElementById(id).textContent='+0%');
  runScenario();
}
function saveScenario() {
  const name = prompt('情景名称：','情景'+(data.scenarios.length+1)); if (!name) return;
  const rI=parseInt(document.getElementById('scIncome').value)||0, rMat=parseInt(document.getElementById('scMaterial').value)||0, rLab=parseInt(document.getElementById('scLabor').value)||0, rMkt=parseInt(document.getElementById('scMarketing').value)||0, rOth=parseInt(document.getElementById('scOther').value)||0;
  const { totalIncome, totalExpense } = calcTotals();
  const matExp=data.expense.filter(e=>e.category==='原材料').reduce((s,e)=>s+e.amount,0), labExp=data.expense.filter(e=>e.category==='人力').reduce((s,e)=>s+e.amount,0), mktExp=data.expense.filter(e=>e.category==='营销').reduce((s,e)=>s+e.amount,0), other=totalExpense-matExp-labExp-mktExp;
  data.scenarios.push({ id:Date.now(), name, params:{rI,rMat,rLab,rMkt,rOth}, result:{ income:totalIncome*(1+rI/100), expense:matExp*(1+rMat/100)+labExp*(1+rLab/100)+mktExp*(1+rMkt/100)+other*(1+rOth/100) }, date:today() });
  save(); renderSavedScenarios();
}
function renderSavedScenarios() {
  const c = document.getElementById('savedScenarios');
  if (!data.scenarios.length) { c.innerHTML='<div class="text-muted">暂无保存的情景</div>'; return; }
  c.innerHTML = data.scenarios.map(s=>{
    const p=s.result.income-s.result.expense, m=s.result.income>0?p/s.result.income*100:0;
    return `<div class="template-card"><div>
      <strong>📌 ${esc(s.name)}</strong> <span class="text-muted">${s.date}</span>
      <div style="font-size:12px;margin-top:4px;">收入:${fm(s.result.income)} 支出:${fm(s.result.expense)} 利润:<span style="color:${p>=0?'var(--profit)':'var(--loss)'}">${fm(p)}</span> 利润率:${m.toFixed(1)}%</div>
      <div class="text-muted">参数: 收入${s.params.rI>=0?'+':''}${s.params.rI}% 材料${s.params.rMat>=0?'+':''}${s.params.rMat}% 人力${s.params.rLab>=0?'+':''}${s.params.rLab}% 营销${s.params.rMkt>=0?'+':''}${s.params.rMkt}% 其他${s.params.rOth>=0?'+':''}${s.params.rOth}%</div>
    </div><button class="btn btn-sm btn-danger" onclick="deleteScenario(${s.id})">删除</button></div>`;
  }).join('');
}
function deleteScenario(id){ data.scenarios=data.scenarios.filter(s=>s.id!==id); save(); renderSavedScenarios(); }

// ========== SUGGESTIONS ==========
function renderSuggestions() {
  const { totalIncome, totalExpense, netProfit, margin } = calcTotals();
  const sugs = [];
  const ce={}; data.expense.forEach(e=>{ce[e.category]=(ce[e.category]||0)+e.amount;});
  const ci={}; data.income.forEach(e=>{ci[e.category]=(ci[e.category]||0)+e.amount;});

  if (!data.income.length && !data.expense.length) {
    document.getElementById('suggestionsContent').innerHTML = '<div class="empty-state">添加收支数据后自动生成分析建议</div>';
    return;
  }

  if (netProfit<0) sugs.push({l:'critical',t:'当前处于亏损状态',d:`净亏损 ${fm(Math.abs(netProfit))}，利润率 ${margin.toFixed(1)}%，必须尽快控制成本或增加收入。`,i:'立即审查各项支出，暂停非必要开销，制定扭亏计划。'});
  else if (margin<10) sugs.push({l:'warning',t:'利润率偏低',d:`当前利润率 ${margin.toFixed(1)}%，低于 15% 的健康线。`,i:`若提升至15%，净利润可达 ${fm(totalIncome*0.15)}。`});
  else sugs.push({l:'positive',t:'盈利能力良好',d:`利润率 ${margin.toFixed(1)}%，处于健康区间。`,i:'继续保持成本控制，寻找增长机会。'});

  const sortedExp = Object.entries(ce).sort((a,b)=>b[1]-a[1]);
  if (sortedExp.length>0 && sortedExp[0][1]/totalExpense>0.5) {
    const [cat, amt] = sortedExp[0];
    sugs.push({l:'warning',t:`「${cat}」占支出 ${(amt/totalExpense*100).toFixed(1)}%，过于集中`,d:`${cat}支出 ${fm(amt)}，占比过半，价格波动风险大。`,i:`降低10%可节省 ${fm(amt*0.1)}。建议比价、谈判、批量采购。`});
  }

  const mktExp = ce['营销']||0, salesInc = ci['销售']||0;
  if (mktExp>0 && salesInc>0) {
    const roi = salesInc/mktExp;
    if (roi<2) sugs.push({l:'warning',t:'营销ROI偏低',d:`营销支出 ${fm(mktExp)}，带来销售 ${fm(salesInc)}，ROI 仅 ${roi.toFixed(1)}:1。`,i:'削减低效渠道，优化投放策略，追踪各渠道转化率。'});
    else if (roi>5) sugs.push({l:'positive',t:'营销ROI优秀',d:`ROI ${roi.toFixed(1)}:1，远超 3:1 基准。`,i:'可适度扩大投放，关注边际ROI变化。'});
  }

  const labExp = ce['人力']||0;
  if (totalExpense>0 && labExp/totalExpense>0.4) sugs.push({l:'warning',t:'人力成本占比偏高',d:`占支出 ${(labExp/totalExpense*100).toFixed(1)}%。`,i:'评估自动化、优化岗位配置、加强绩效考核。'});

  const matCost = ce['原材料']||0;
  if (totalIncome>0 && matCost/totalIncome>0.6) sugs.push({l:'critical',t:'原材料成本过高',d:`占收入 ${(matCost/totalIncome*100).toFixed(1)}%。`,i:`降5%可增利 ${fm(matCost*0.05)}。供应商竞价、优化BOM、减少损耗。`});

  if (Object.keys(ci).length<=1 && totalIncome>0) sugs.push({l:'warning',t:'收入来源单一',d:`仅 ${Object.keys(ci).length} 个来源，抗风险弱。`,i:'开发新业务线或渠道。'});

  const OH = (ce['行政']||0)+(ce['租金']||0);
  if (totalExpense>0 && OH/totalExpense>0.25) sugs.push({l:'warning',t:'间接费用偏高',d:`行政+租金占 ${(OH/totalExpense*100).toFixed(1)}%。`,i:`降20%可省 ${fm(OH*0.2)}。评估远程办公、共享空间。`});

  if (data.income.length+data.expense.length<8) sugs.push({l:'warning',t:'数据量较少',d:'当前记录较少，分析准确度有限。',i:'持续录入数据以获得更精准的分析。'});

  document.getElementById('suggestionsContent').innerHTML = sugs.map(s=>`
    <div class="suggestion ${s.l}"><div class="s-title">${s.t}</div><div class="s-detail">${s.d}</div><div class="s-impact">💡 ${s.i}</div></div>
  `).join('');
}

// ========== CSV ==========
function exportCSV() {
  let csv='类型,日期,描述,类别,金额\n';
  data.income.forEach(e=>csv+=`收入,${e.date},${e.desc},${e.category},${e.amount}\n`);
  data.expense.forEach(e=>csv+=`支出,${e.date},${e.desc},${e.category},${e.amount}\n`);
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='财务数据_'+today()+'.csv';a.click();URL.revokeObjectURL(u);
}
function importCSV() {
  const inp=document.createElement('input');inp.type='file';inp.accept='.csv';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{
      const lines=ev.target.result.split('\n').slice(1);let c=0;
      lines.forEach(line=>{const p=line.split(',');if(p.length<5)return;
        const [type,date,desc,cat,amtS]=p;const amt=parseFloat(amtS);if(!amt||amt<=0)return;
        if(type==='收入') data.income.push({id:Date.now()+Math.random()*1000,desc:desc.trim(),amount:amt,category:cat.trim(),date:date.trim()});
        else if(type==='支出') data.expense.push({id:Date.now()+Math.random()*1000,desc:desc.trim(),amount:amt,category:cat.trim(),date:date.trim()});
        c++;
      });
      save();refreshAll();alert('导入 '+c+' 条');
    };r.readAsText(f,'UTF-8');
  };inp.click();
}
function backupData() {
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='财务备份_'+today()+'.json';a.click();URL.revokeObjectURL(u);
}

function clearAll() {
  if (confirm('确定清空所有数据？此操作不可恢复。')) {
    data={income:[],expense:[],templates:[],goals:[],scenarios:[]};
    save();
    refreshAll();
    alert('已清空，从零开始！');
  }
}

// ========== REFRESH ALL ==========
function refreshAll() {
  const atab = document.querySelector('.tab-content.active');
  if (atab) {
    const n = atab.id.replace('tab-','');
    if (n==='dashboard') refreshDashboard();
    if (n==='records') renderFilteredTable();
    if (n==='templates') renderTemplates();
    if (n==='breakeven') calcBreakEven();
    if (n==='scenario') { runScenario(); renderSavedScenarios(); }
    if (n==='goals') renderGoals();
    if (n==='suggestions') renderSuggestions();
  }
  setTimeout(resizeCharts,300);
}
